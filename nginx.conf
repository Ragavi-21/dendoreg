##############################################################################
# Nginx config for dendoregister.in
# Copy this file to: /etc/nginx/sites-available/dendoregister.in
# Then: sudo ln -s /etc/nginx/sites-available/dendoregister.in /etc/nginx/sites-enabled/
# Then: sudo nginx -t && sudo nginx -s reload
##############################################################################

server {
    listen 80;
    server_name dendoregister.in www.dendoregister.in;

    # ── CRITICAL: allow up to 15 MB per request so 10 MB file uploads work ──
    # Nginx default is 1 MB — without this line every upload >1 MB returns
    # a 413 error (HTML page), which the frontend can't parse as JSON and
    # shows "Something went wrong. Please try again."
    client_max_body_size 15M;

    # Increase timeouts for large file uploads on slow connections
    client_body_timeout     120s;
    proxy_connect_timeout   120s;
    proxy_send_timeout      120s;
    proxy_read_timeout      120s;

    location / {
        proxy_pass         http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # Serve uploaded files directly (faster than going through Node)
    location /uploads/ {
        alias /path/to/dendoreg/backend/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }
}

# HTTPS block — if you have SSL (Let's Encrypt / Certbot)
# After running: sudo certbot --nginx -d dendoregister.in -d www.dendoregister.in
# Certbot will auto-add/modify the SSL config below. Make sure
# client_max_body_size 15M is also inside the https server block.
